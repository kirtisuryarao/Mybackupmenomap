name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menomap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/menomap_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/menomap_test
      GROQ_API_KEY: ci-test-key
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      FILE_AUTH_FALLBACK: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database schema
        run: npm exec -- prisma db push --skip-generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests with coverage
        run: npm run test

      - name: Build
        run: npm run build

  db-integration-tests:
    runs-on: ubuntu-latest
    needs: test-and-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menomap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/menomap_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/menomap_test
      GROQ_API_KEY: ci-test-key
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      FILE_AUTH_FALLBACK: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database schema
        run: npm exec -- prisma db push --skip-generate

      - name: Reset test database
        run: npm run test:db:reset

      - name: Run DB-backed integration tests
        run: npm run test:integration:db
